spring:
  config:
    import: optional:classpath:codex-runtime-defaults.yml
  main:
    web-application-type: none

logging:
  level:
    org.dean.codex: ${CODEX_LOG_LEVEL:WARN}
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: OFF

codex:
  workspace-root: ${user.dir}
  storage-root: ${user.home}/.codex-java
  cli:
    show-tool-activity: ${CODEX_SHOW_TOOL_ACTIVITY:true}
    app-server:
      main-class: ${CODEX_APP_SERVER_MAIN_CLASS:org.dean.codex.runtime.springai.appserver.CodexAppServerStdioApplication}
      request-timeout-seconds: ${CODEX_APP_SERVER_TIMEOUT_SECONDS:30}
  shell:
    approval-mode: ${CODEX_SHELL_APPROVAL_MODE:review-sensitive}
    timeout-seconds: ${CODEX_SHELL_TIMEOUT_SECONDS:60}
  skills:
    enabled: ${CODEX_SKILLS_ENABLED:true}
    user-root: ${CODEX_USER_SKILLS_ROOT:${user.home}/.codex/skills}
    workspace-relative-root: ${CODEX_WORKSPACE_SKILLS_ROOT:.codex/skills}
  context:
    preserve-recent-turns: ${CODEX_CONTEXT_PRESERVE_RECENT_TURNS:4}
