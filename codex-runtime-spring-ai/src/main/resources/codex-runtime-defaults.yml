spring:
  ai:
    chat:
      client:
        observations:
          log-prompt: ${CODEX_CHAT_LOG_PROMPT:false}
          log-completion: ${CODEX_CHAT_LOG_COMPLETION:false}
    model:
      chat: openai
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      chat:
        options:
          model: ${CODEX_CHAT_MODEL:gpt-5.4}
          temperature: ${CODEX_TEMPERATURE:0.2}
codex:
  agent:
    max-depth: ${CODEX_AGENT_MAX_DEPTH:4}
  model:
    context-window: ${CODEX_CONTEXT_WINDOW:272000}
    auto-compact-token-limit: ${CODEX_AUTO_COMPACT_TOKEN_LIMIT:200000}
